<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="color-scheme" content="light">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reset your AnatoLearn password</title>
  </head>
  <body style="margin:0;background:#f6f8fc;color:#0f172a;font-family:Arial,sans-serif;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:32px 16px;">
      <tr><td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#ffffff;border:1px solid #e2e8f0;border-radius:16px;padding:32px;">
          <tr><td>
            <h1 style="margin:0 0 16px;font-size:24px;">Reset your password</h1>
            <p style="margin:0 0 20px;line-height:1.6;">Enter this six-digit code in AnatoLearn:</p>
            <p aria-label="Your six-digit password recovery code" style="margin:0 0 24px;font-size:32px;font-weight:700;letter-spacing:8px;">{{ .Token }}</p>
            <p style="margin:0 0 20px;line-height:1.6;">Or use the secure recovery link:</p>
            <p style="margin:0 0 24px;"><a href="{{ .ConfirmationURL }}" style="color:#2563eb;font-weight:700;">Reset password</a></p>
            <p style="margin:0;color:#64748b;line-height:1.6;">If you did not request this, you can ignore this email.</p>
          </td></tr>
        </table>
      </td></tr>
    </table>
  </body>
</html>
