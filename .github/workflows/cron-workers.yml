name: Process AnatoLearn scheduled work

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: anatolearn-cron-workers
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    env:
      APP_URL: ${{ secrets.ANATOLEARN_APP_URL }}
      CRON_SECRET: ${{ secrets.ANATOLEARN_CRON_SECRET }}
    steps:
      - name: Validate scheduler configuration
        shell: bash
        run: |
          set -euo pipefail
          test -n "$APP_URL" || { echo "ANATOLEARN_APP_URL is not configured" >&2; exit 1; }
          test -n "$CRON_SECRET" || { echo "ANATOLEARN_CRON_SECRET is not configured" >&2; exit 1; }
          case "$APP_URL" in
            https://*) ;;
            *) echo "ANATOLEARN_APP_URL must use https" >&2; exit 1 ;;
          esac

      - name: Finalize expired attempts and process notifications
        shell: bash
        run: |
          set -euo pipefail
          for path in \
            "/api/internal/attempts/expire" \
            "/api/internal/notifications/process"; do
            curl \
              --fail-with-body \
              --silent \
              --show-error \
              --retry 2 \
              --retry-delay 3 \
              --max-time 30 \
              -H "Authorization: Bearer ${CRON_SECRET}" \
              "${APP_URL%/}${path}"
          done
