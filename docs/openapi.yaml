        - { name: to, in: query, schema: { type: string, format: date-time } }
      responses: *adminListResponses
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Supabase access token
    cookieAuth:
      type: apiKey
      in: cookie
      name: sb-session
      description: Logical Supabase SSR session; concrete cookie names are SDK-managed.
    cronBearer:
      type: http
      scheme: bearer
      bearerFormat: CRON_SECRET
      description: Server-only random secret of at least 32 characters; not a Supabase user token.
  headers:
    XRequestId:
      description: Correlation ID generated for the response; error envelopes repeat it as error.requestId.
      schema: { type: string, format: uuid }
    PrivateCacheControl:
      description: Prevents shared or browser storage of authenticated and error responses.
      schema: { type: string, const: 'private, no-store' }
    HealthCacheControl:
      description: Allows brief public caching of the dependency-free liveness response.
      schema: { type: string, const: 'public, max-age=30' }
    MetaCacheControl:
      description: Allows five-minute public caching of stable API capability metadata.
      schema: { type: string, const: 'public, max-age=300' }
    PrivateVary:
      description: Separates authenticated representations by bearer and cookie credentials.
      schema: { type: string, const: 'Authorization, Cookie' }
    RetryAfter:
      description: Seconds until the process-local rate-limit window permits retry.
      schema: { type: integer, minimum: 1 }
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    AttemptId:
      name: attemptId
      in: path
      required: true
      schema: { type: string, format: uuid }
    AttemptQuestionId:
      name: attemptQuestionId
      in: path
      required: true
      schema: { type: string, format: uuid }
    RecipientId:
      name: recipientId
      in: path
      required: true
      schema: { type: string, format: uuid }
    OrganSystemIdPath:
      name: organSystemId
      in: path
      required: true
      schema: { type: string, format: uuid }
    Slug:
      name: slug
      in: path
      required: true
      schema: { type: string }
    Page:
      name: page
      in: query
      schema: { type: integer, minimum: 1, default: 1 }
    PageSize:
      name: pageSize
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    Q:
      name: q
      in: query
      schema: { type: string, maxLength: 200 }
    PublishStatus:
      name: status
      in: query
      schema: { $ref: '#/components/schemas/PublishStatus' }
    ContentSortBy:
      name: sortBy
      in: query
      schema: { type: string, enum: [displayOrder, name, title, createdAt, updatedAt], default: displayOrder }
    SortOrder:
      name: sortOrder
      in: query
      schema: { type: string, enum: [asc, desc], default: asc }
    OrganSystemIdQuery:
      name: organSystemId
      in: query
      schema: { type: string, format: uuid }
    TopicIdQuery:
      name: topicId
      in: query
      schema: { type: string, format: uuid }
    DifficultyQuery:
      name: difficulty
      in: query
      schema: { $ref: '#/components/schemas/Difficulty' }
    AssessmentTypeQuery:
      name: assessmentType
      in: query
      schema: { $ref: '#/components/schemas/AssessmentType' }
    AttemptStatusQuery:
      name: status
      in: query
      schema: { $ref: '#/components/schemas/AttemptStatus' }
  requestBodies:
    RegisterBody:
      required: true
      content:
        application/json:
          schema: { $ref: '#/components/schemas/RegisterInput' }
    LoginBody:
      required: true
      content: { application/json: { schema: { $ref: '#/components/schemas/LoginInput' } } }
    EmailBody:
      required: true
      content: { application/json: { schema: { $ref: '#/components/schemas/EmailInput' } } }
    ResetPasswordBody:
      required: true
      content: { application/json: { schema: { $ref: '#/components/schemas/ResetPasswordInput' } } }
    ProfileUpdateBody:
      required: true
      content: { application/json: { schema: { $ref: '#/components/schemas/ProfileUpdateInput' } } }
    ChangePasswordBody:
      required: true
      content: { application/json: { schema: { $ref: '#/components/schemas/ChangePasswordInput' } } }
    ContentMutation:
      required: true
      content:
        application/json:
          schema:
            oneOf:
              - { $ref: '#/components/schemas/StatusInput' }
              - type: object
                minProperties: 1
                description: A strict non-empty partial of the resource's create schema.
  schemas:
    LoginInput:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8, maxLength: 128, format: password }
    RegisterInput:
      type: object
      additionalProperties: false
      required: [email, password, fullName]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8, maxLength: 128, format: password }
        fullName: { type: string, minLength: 2, maxLength: 100 }
    EmailInput:
      type: object
      additionalProperties: false
      required: [email]
      properties: { email: { type: string, format: email } }
    ResetPasswordInput:
      type: object
      additionalProperties: false
      required: [accessToken, password]
      properties:
        accessToken: { type: string, minLength: 1, description: Provider-issued recovery access token. }
        password: { type: string, minLength: 12, maxLength: 128, format: password }
    ProfileUpdateInput:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        fullName: { type: string, minLength: 2, maxLength: 100 }
        avatarUrl: { type: [string, 'null'], format: uri }
    ChangePasswordInput:
      type: object
      additionalProperties: false
      required: [currentPassword, newPassword]
      properties:
        currentPassword: { type: string, minLength: 8, maxLength: 128, format: password }
        newPassword: { type: string, minLength: 12, maxLength: 128, format: password, description: Must differ from currentPassword. }
    AuthProfileSummary:
      type: object
      additionalProperties: false
      required: [id, fullName]
      properties:
        id: { type: string, format: uuid }
        fullName: { type: string }
    SessionProfile:
      type: object
      additionalProperties: false
      required: [id, fullName, email]
      properties:
        id: { type: string, format: uuid }
        fullName: { type: string }
        email: { type: string, format: email }
    Profile:
      type: object
      additionalProperties: false
      required: [id, fullName, email, avatarUrl, isActive]
      properties:
        id: { type: string, format: uuid }
        fullName: { type: string }
        email: { type: string, format: email }
        avatarUrl: { type: [string, 'null'] }
        isActive: { type: boolean }
    RegisterResult:
      type: object
      additionalProperties: false
      required: [userId, emailConfirmationRequired]
      properties:
        userId: { type: string, format: uuid }
        emailConfirmationRequired: { type: boolean }
    LoginResult:
      type: object
      additionalProperties: false
      required: [accessToken, refreshToken, expiresAt, tokenType, profile]
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        expiresAt: { type: integer }
        tokenType: { type: string }
        profile: { $ref: '#/components/schemas/AuthProfileSummary' }
    PublishedOrganSystem:
      type: object
      additionalProperties: false
      required: [id, name, slug, shortDescription, longDescription, coverImageUrl, iconImageUrl, displayOrder, isActive]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        shortDescription: { type: string }
        longDescription: { type: [string, 'null'] }
        coverImageUrl: { type: [string, 'null'] }
        iconImageUrl: { type: [string, 'null'] }
        displayOrder: { type: integer, minimum: 0 }
        isActive: { type: boolean, const: true }
    PublishedTopic:
      type: object
      additionalProperties: false
      required: [id, organSystemId, title, slug, summary, coverImageUrl, displayOrder]
      properties:
        id: { type: string, format: uuid }
        organSystemId: { type: string, format: uuid }
        title: { type: string }
        slug: { type: string }
        summary: { type: [string, 'null'] }
        coverImageUrl: { type: [string, 'null'] }
        displayOrder: { type: integer, minimum: 0 }
    PublishedLesson:
      type: object
      additionalProperties: false
      required: [id, topicId, title, slug, summary, contentBlocks, estimatedReadingMinutes, displayOrder]
      properties:
        id: { type: string, format: uuid }
        topicId: { type: string, format: uuid }
        title: { type: string }
        slug: { type: string }
        summary: { type: [string, 'null'] }
        contentBlocks: { type: array, maxItems: 200, items: { $ref: '#/components/schemas/ContentBlock' } }
        estimatedReadingMinutes: { type: integer, minimum: 0, maximum: 600 }
        displayOrder: { type: integer, minimum: 0 }
    PublishStatus: { type: string, enum: [DRAFT, PUBLISHED, ARCHIVED] }
    EditableStatus: { type: string, enum: [DRAFT, PUBLISHED] }
    Difficulty: { type: string, enum: [EASY, MEDIUM, HARD] }
    AssessmentType: { type: string, enum: [QUIZ, TEST] }
    AttemptStatus: { type: string, enum: [IN_PROGRESS, COMPLETED, AUTO_SUBMITTED, ABANDONED] }
    FeedbackType: { type: string, enum: [GENERAL, BUG_REPORT, QUESTION_REQUEST, IMPROVEMENT] }
    FeedbackStatus: { type: string, enum: [NEW, REVIEWED, RESOLVED] }
    NotificationType: { type: string, enum: [DAILY_STUDY, TEST_REMINDER, ANNOUNCEMENT] }
    NotificationStatus: { type: string, enum: [DRAFT, SCHEDULED, PROCESSING, SENT, PARTIAL, FAILED, CANCELLED] }
    NotificationDeliveryStatus: { type: string, enum: [PENDING, TICKETED, SENT, FAILED, CANCELLED] }
    DevicePlatform: { type: string, enum: [IOS, ANDROID] }
    Meta:
      type: object
      additionalProperties: false
      required: [apiVersion, capabilities]
      properties:
        apiVersion: { type: string, const: v1 }
        capabilities:
          type: object
          additionalProperties: false
          required: [authentication, storage, notifications]
          properties:
            authentication: { type: boolean, const: true }
            storage: { type: string, const: private }
            notifications: { type: boolean, const: true, description: Notification APIs are implemented; this does not assert that Expo is enabled or ready. }
    DeviceTokenInput:
      type: object
      additionalProperties: false
      required: [expoPushToken, platform]
      properties:
        expoPushToken: { type: string, maxLength: 256, pattern: '^Expo(?:nent)?PushToken\[[A-Za-z0-9_-]+\]$' }
        platform: { $ref: '#/components/schemas/DevicePlatform' }
    DeviceToken:
      type: object
      additionalProperties: false
      required: [id, platform, isActive, lastSeenAt]
      properties:
        id: { type: string, format: uuid }
        platform: { $ref: '#/components/schemas/DevicePlatform' }
        isActive: { type: boolean }
        lastSeenAt: { type: string, format: date-time }
    FeedbackCreateInput:
      type: object
      additionalProperties: false
      required: [type, subject, message]
      properties:
        type: { $ref: '#/components/schemas/FeedbackType' }
        subject: { type: string, minLength: 1, maxLength: 160 }
        message: { type: string, minLength: 1, maxLength: 5000 }
    LearnerFeedback:
      type: object
      additionalProperties: false
      required: [id, type, subject, message, status, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        type: { $ref: '#/components/schemas/FeedbackType' }
        subject: { type: string }
        message: { type: string }
        status: { $ref: '#/components/schemas/FeedbackStatus' }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    SafePerson:
      type: object
      additionalProperties: false
      required: [id, fullName, email, isActive]
      properties:
        id: { type: string, format: uuid }
        fullName: { type: string }
        email: { type: string, format: email }
        isActive: { type: boolean }
    AdminFeedback:
      allOf:
        - { $ref: '#/components/schemas/LearnerFeedback' }
        - type: object
          required: [adminNotes, reviewedAt, resolvedAt, submitter, reviewer, resolver]
          properties:
            adminNotes: { type: [string, 'null'] }
            reviewedAt: { type: [string, 'null'], format: date-time }
            resolvedAt: { type: [string, 'null'], format: date-time }
            submitter: { oneOf: [{ $ref: '#/components/schemas/SafePerson' }, { type: 'null' }] }
            reviewer: { oneOf: [{ $ref: '#/components/schemas/SafePerson' }, { type: 'null' }] }
            resolver: { oneOf: [{ $ref: '#/components/schemas/SafePerson' }, { type: 'null' }] }
    AdminFeedbackUpdateInput:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        adminNotes: { type: [string, 'null'], maxLength: 5000 }
        status: { type: string, enum: [REVIEWED, RESOLVED] }
    AdminUserActivityInput:
      type: object
      additionalProperties: false
      required: [isActive]
      properties: { isActive: { type: boolean } }
    AdminUser:
      type: object
      additionalProperties: false
      required: [id, fullName, email, avatarUrl, isActive, lastLoginAt, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        fullName: { type: string }
        email: { type: string, format: email }
        avatarUrl: { type: [string, 'null'] }
        isActive: { type: boolean }
        lastLoginAt: { type: [string, 'null'], format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    AdminUserDetail:
      allOf:
        - { $ref: '#/components/schemas/AdminUser' }
        - type: object
          required: [activity]
          properties:
            activity:
              type: object
              additionalProperties: false
              required: [attempts, submittedAttempts, feedback, lastAttemptAt]
              properties:
                attempts: { type: integer, minimum: 0 }
                submittedAttempts: { type: integer, minimum: 0 }
                feedback: { type: integer, minimum: 0 }
                lastAttemptAt: { type: [string, 'null'], format: date-time }
    AdminUserSummary:
      type: object
      additionalProperties: false
      required: [total, active, inactive, joined30Days]
      properties:
        total: { type: integer, minimum: 0 }
        active: { type: integer, minimum: 0 }
        inactive: { type: integer, minimum: 0 }
        joined30Days: { type: integer, minimum: 0 }
    NotificationAudience:
      oneOf:
        - type: object
          additionalProperties: false
          required: [type]
          properties: { type: { const: ALL_ACTIVE_USERS } }
        - type: object
          additionalProperties: false
          required: [type, userIds]
          properties:
            type: { const: SELECTED_USERS }
            userIds: { type: array, minItems: 1, maxItems: 500, uniqueItems: true, items: { type: string, format: uuid } }
    CampaignInput:
      type: object
      additionalProperties: false
      required: [type, title, message, target]
      properties:
        type: { $ref: '#/components/schemas/NotificationType' }
        title: { type: string, minLength: 1, maxLength: 100 }
        message: { type: string, minLength: 1, maxLength: 1000 }
        target: { $ref: '#/components/schemas/NotificationAudience' }
    CampaignUpdateInput:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        type: { $ref: '#/components/schemas/NotificationType' }
        title: { type: string, minLength: 1, maxLength: 100 }
        message: { type: string, minLength: 1, maxLength: 1000 }
        target: { $ref: '#/components/schemas/NotificationAudience' }
    CampaignScheduleInput:
      type: object
      additionalProperties: false
      required: [scheduledAt]
      properties: { scheduledAt: { type: string, format: date-time, description: Offset required; must be at least 60 seconds after database time. } }
    Campaign:
      type: object
      additionalProperties: false
      required: [id, type, title, message, target, scheduledAt, sentAt, status, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        type: { $ref: '#/components/schemas/NotificationType' }
        title: { type: string }
        message: { type: string }
        target: { $ref: '#/components/schemas/NotificationAudience' }
        scheduledAt: { type: [string, 'null'], format: date-time }
        sentAt: { type: [string, 'null'], format: date-time }
        status: { $ref: '#/components/schemas/NotificationStatus' }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    NotificationRecipient:
      type: object
      additionalProperties: false
      required: [id, userId, readAt, createdAt, _count]
      properties:
        id: { type: string, format: uuid }
        userId: { type: string, format: uuid }
        readAt: { type: [string, 'null'], format: date-time }
        createdAt: { type: string, format: date-time }
        _count:
          type: object
          additionalProperties: false
          required: [deliveries]
          properties: { deliveries: { type: integer, minimum: 0 } }
    NotificationDelivery:
      type: object
      additionalProperties: false
      required: [id, status, attemptCount, receiptAttemptCount, providerErrorCode, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        status: { $ref: '#/components/schemas/NotificationDeliveryStatus' }
        attemptCount: { type: integer, minimum: 0, maximum: 5 }
        receiptAttemptCount: { type: integer, minimum: 0, maximum: 20 }
        providerErrorCode: { type: [string, 'null'] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    LearnerNotification:
      type: object
      additionalProperties: false
      required: [id, type, title, message, sentAt, readAt, createdAt]
      properties:
        id: { type: string, format: uuid, description: NotificationRecipient ID used by the read route. }
        type: { $ref: '#/components/schemas/NotificationType' }
        title: { type: string }
        message: { type: string }
        sentAt: { type: [string, 'null'], format: date-time }
        readAt: { type: [string, 'null'], format: date-time }
        createdAt: { type: string, format: date-time }
    ProviderStatus:
      type: object
      additionalProperties: false
      required: [enabled, ready]
      properties:
        enabled: { type: boolean }
        ready: { type: boolean }
    AdminDashboard:
      type: object
      additionalProperties: false
      required: [generatedAt, range, counts, accuracy, attemptsTrend, contentReadinessCriteria, contentCompleteness, recentRegistrations, recentFeedback, recentAudit]
      properties:
        generatedAt: { type: string, format: date-time }
        range:
          type: object
          additionalProperties: false
          required: [days, start, endExclusive]
          properties:
            days: { type: integer, enum: [7, 30, 90] }
            start: { type: string, format: date-time }
            endExclusive: { type: string, format: date-time }
        counts:
          type: object
          additionalProperties: false
          required: [totalUsers, activeUsers, organSystems, topics, flashcards, questions, publishedLessons, quizQuestions, testQuestions, newFeedback, completedQuizzes, completedTests]
          properties:
            totalUsers: &nonNegativeCount { type: integer, minimum: 0 }
            activeUsers: *nonNegativeCount
            organSystems: *nonNegativeCount
            topics: *nonNegativeCount
            flashcards: *nonNegativeCount
            questions: *nonNegativeCount
            publishedLessons: *nonNegativeCount
            quizQuestions: *nonNegativeCount
            testQuestions: *nonNegativeCount
            newFeedback: *nonNegativeCount
            completedQuizzes: *nonNegativeCount
            completedTests: *nonNegativeCount
        accuracy:
          type: object
          additionalProperties: false
          required: [quiz, test]
          properties:
            quiz: { $ref: '#/components/schemas/ProgressMetric' }
            test: { $ref: '#/components/schemas/ProgressMetric' }
        attemptsTrend:
          type: array
          minItems: 7
          maxItems: 90
          items:
            type: object
            additionalProperties: false
            required: [date, quizAttempts, testAttempts]
            properties:
              date: { type: string, format: date }
              quizAttempts: { type: integer, minimum: 0 }
              testAttempts: { type: integer, minimum: 0 }
        contentReadinessCriteria:
          type: object
          additionalProperties: false
          required: [denominator, completeTopicRequires]
          properties:
            denominator: { type: string, const: NON_ARCHIVED_TOPICS }
            completeTopicRequires:
              type: array
              minItems: 5
              maxItems: 5
              prefixItems:
                - { const: PUBLISHED_ACTIVE_SYSTEM_AND_PUBLISHED_TOPIC }
                - { const: ELIGIBLE_PUBLISHED_LESSON }
                - { const: ELIGIBLE_PUBLISHED_FLASHCARD }
                - { const: ELIGIBLE_ACTIVE_PUBLISHED_QUIZ_QUESTION }
                - { const: ELIGIBLE_ACTIVE_PUBLISHED_TEST_QUESTION }
        contentCompleteness:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [id, name, displayOrder, completeTopics, lessons, flashcards, quizQuestions, testQuestions]
            properties:
              id: { type: string, format: uuid }
              name: { type: string }
              displayOrder: { type: integer }
              completeTopics: { $ref: '#/components/schemas/ProgressMetric' }
              lessons: { $ref: '#/components/schemas/ProgressMetric' }
              flashcards: { $ref: '#/components/schemas/ProgressMetric' }
              quizQuestions: { $ref: '#/components/schemas/ProgressMetric' }
              testQuestions: { $ref: '#/components/schemas/ProgressMetric' }
        recentRegistrations: { type: array, maxItems: 5, items: { $ref: '#/components/schemas/RecentRegistration' } }
        recentFeedback: { type: array, maxItems: 5, items: { $ref: '#/components/schemas/RecentFeedback' } }
        recentAudit: { type: array, maxItems: 10, items: { $ref: '#/components/schemas/RecentAudit' }, description: "Redacted projection without snapshots, email, IP hash, or user agent." }
    RecentRegistration:
      type: object
      additionalProperties: false
      required: [id, fullName, email, isActive, createdAt]
      properties:
        id: { type: string, format: uuid }
        fullName: { type: string }
        email: { type: string, format: email }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }
    RecentFeedback:
      type: object
      additionalProperties: false
      required: [id, type, subject, status, createdAt, user]
      properties:
        id: { type: string, format: uuid }
        type: { $ref: '#/components/schemas/FeedbackType' }
        subject: { type: string }
        status: { $ref: '#/components/schemas/FeedbackStatus' }
        createdAt: { type: string, format: date-time }
        user:
          oneOf:
            - type: object
              additionalProperties: false
              required: [id, fullName, email]
              properties:
                id: { type: string, format: uuid }
                fullName: { type: string }
                email: { type: string, format: email }
            - { type: 'null' }
    RecentAudit:
      type: object
      additionalProperties: false
      required: [id, action, entityType, entityId, createdAt, actor]
      properties:
        id: { type: string, format: uuid }
        action: { $ref: '#/components/schemas/AuditAction' }
        entityType: { type: string }
        entityId: { type: string }
        createdAt: { type: string, format: date-time }
        actor:
          oneOf:
            - type: object
              additionalProperties: false
              required: [id, fullName]
              properties:
                id: { type: string, format: uuid }
                fullName: { type: string }
            - { type: 'null' }
    NotificationCronResult:
      type: object
      additionalProperties: false
      required: [campaigns, deliveries, finalized]
      properties:
        campaigns: { type: integer, minimum: 0, maximum: 5 }
        deliveries: { type: integer, minimum: 0, maximum: 500 }
        finalized: { type: integer, minimum: 0 }
    StartAssessmentInput:
      type: object
      additionalProperties: false
      required: [assessmentType, organSystemId, questionCount]
      properties:
        assessmentType: { $ref: '#/components/schemas/AssessmentType' }
        organSystemId: { type: string, format: uuid }
        topicIds:
          type: array
          minItems: 1
          maxItems: 100
          uniqueItems: true
          items: { type: string, format: uuid }
        questionCount: { type: integer, minimum: 5, maximum: 50 }
    EmptyMutation:
      type: object
      additionalProperties: false
      maxProperties: 0
    AttemptAnswerInput:
      type: object
      additionalProperties: false
      required: [answeredOptionKey]
      properties:
        answeredOptionKey: { type: [string, 'null'], format: uuid, description: "A key from this attempt question's shuffled snapshot options, or null to clear." }
        timeSpentSeconds: { type: integer, minimum: 0, maximum: 86400, description: Monotonic telemetry; values below the stored value do not decrease it. }
    AttemptAnswerReceipt:
      type: object
      additionalProperties: false
      required: [id, answeredOptionKey, answeredAt, timeSpentSeconds]
      properties:
        id: { type: string, format: uuid }
        answeredOptionKey: { type: [string, 'null'], format: uuid }
        answeredAt: { type: [string, 'null'], format: date-time }
        timeSpentSeconds: { type: [integer, 'null'], minimum: 0, maximum: 86400 }
    AttemptSnapshotOption:
      type: object
      additionalProperties: false
      required: [key, label, displayOrder, optionText, imageUrl, mediaId]
      properties:
        key: { type: string, format: uuid }
        label: { type: string, pattern: '^[A-F]$' }
        displayOrder: { type: integer, minimum: 1, maximum: 6 }
        optionText: { type: string }
        imageUrl: { type: [string, 'null'] }
        mediaId: { type: [string, 'null'], format: uuid }
    AttemptQuestionSafe:
      type: object
      description: Secret-safe for every status; correctOptionKey, isCorrect, and explanation are absent.
      required: [id, displayOrder, questionText, imageUrl, mediaId, options, answeredOptionKey, answeredAt, timeSpentSeconds, topicId, topicTitle, difficulty, conceptTag, organSystemId, organSystemName]
      properties:
        id: { type: string, format: uuid }
        displayOrder: { type: integer, minimum: 1 }
        questionText: { type: string }
        imageUrl: { type: [string, 'null'] }
        mediaId: { type: [string, 'null'], format: uuid }
        options:
          type: array
          minItems: 2
          maxItems: 6
          items: { $ref: '#/components/schemas/AttemptSnapshotOption' }
        answeredOptionKey: { type: [string, 'null'], format: uuid }
        answeredAt: { type: [string, 'null'], format: date-time }
        timeSpentSeconds: { type: [integer, 'null'], minimum: 0 }
        topicId: { type: string, format: uuid }
        topicTitle: { type: string }
        difficulty: { $ref: '#/components/schemas/Difficulty' }
        conceptTag: { type: [string, 'null'] }
        organSystemId: { type: string, format: uuid }
        organSystemName: { type: string }
    AttemptQuestionResult:
      allOf:
        - { $ref: '#/components/schemas/AttemptQuestionSafe' }
        - type: object
          required: [correctOptionKey, isCorrect, explanation]
          properties:
            correctOptionKey: { type: string, format: uuid }
            isCorrect: { type: [boolean, 'null'] }
            explanation: { type: string }
    AttemptBase:
      type: object
      required: [id, assessmentType, organSystemId, topicIds, requestedQuestionCount, totalQuestionCount, timeLimitSeconds, startedAt, expiresAt, completedAt, status, retakeSourceId]
      properties:
        id: { type: string, format: uuid }
        assessmentType: { $ref: '#/components/schemas/AssessmentType' }
        organSystemId: { type: string, format: uuid }
        topicIds:
          type: array
          items: { type: string, format: uuid }
        requestedQuestionCount: { type: integer, minimum: 5, maximum: 50 }
        totalQuestionCount: { type: integer, minimum: 0, maximum: 50 }
        timeLimitSeconds: { type: [integer, 'null'], minimum: 0, description: Null for quizzes; questionCount times 60 for tests. }
        startedAt: { type: string, format: date-time }
        expiresAt: { type: [string, 'null'], format: date-time }
        completedAt: { type: [string, 'null'], format: date-time }
        status: { $ref: '#/components/schemas/AttemptStatus' }
        retakeSourceId: { type: [string, 'null'], format: uuid }
    AttemptDetail:
      allOf:
        - { $ref: '#/components/schemas/AttemptBase' }
        - type: object
          required: [questions]
          properties:
            questions:
              type: array
              items: { $ref: '#/components/schemas/AttemptQuestionSafe' }
    AttemptResult:
      allOf:
        - { $ref: '#/components/schemas/AttemptBase' }
        - type: object
          required: [correctCount, incorrectCount, unansweredCount, scorePercentage, durationSeconds, questions]
          properties:
            correctCount: { type: integer, minimum: 0 }
            incorrectCount: { type: integer, minimum: 0 }
            unansweredCount: { type: integer, minimum: 0 }
            scorePercentage: { type: number, minimum: 0, maximum: 100, multipleOf: 0.01 }
            durationSeconds: { type: integer, minimum: 0 }
            questions:
              type: array
              items: { $ref: '#/components/schemas/AttemptQuestionResult' }
    AttemptListItem:
      allOf:
        - { $ref: '#/components/schemas/AttemptBase' }
        - type: object
          description: Result fields are present only for COMPLETED and AUTO_SUBMITTED; they are absent for IN_PROGRESS and ABANDONED.
          properties:
            correctCount: { type: integer, minimum: 0 }
            incorrectCount: { type: integer, minimum: 0 }
            unansweredCount: { type: integer, minimum: 0 }
            scorePercentage: { type: number, minimum: 0, maximum: 100, multipleOf: 0.01 }
            durationSeconds: { type: [integer, 'null'], minimum: 0 }
    AdminAttemptUser:
      type: object
      additionalProperties: false
      required: [id, fullName, email, isActive]
      properties:
        id: { type: string, format: uuid }
        fullName: { type: string }
        email: { type: string, format: email }
        isActive: { type: boolean }
    AdminAttemptListItem:
      allOf:
        - { $ref: '#/components/schemas/AttemptListItem' }
        - type: object
          required: [user]
          properties: { user: { $ref: '#/components/schemas/AdminAttemptUser' } }
    AdminAttemptDetail:
      anyOf:
        - allOf:
            - { $ref: '#/components/schemas/AttemptDetail' }
            - type: object
              required: [user]
              properties: { user: { $ref: '#/components/schemas/AdminAttemptUser' } }
        - allOf:
            - { $ref: '#/components/schemas/AttemptResult' }
            - type: object
              required: [user]
              properties: { user: { $ref: '#/components/schemas/AdminAttemptUser' } }
    LessonProgressInput:
      type: object
      additionalProperties: false
      required: [completed]
      properties: { completed: { type: boolean } }
    LessonProgress:
      type: object
      additionalProperties: false
      required: [contentLessonId, completed, completedAt, lastViewedAt]
      properties:
        contentLessonId: { type: string, format: uuid }
        completed: { type: boolean }
        completedAt: { type: [string, 'null'], format: date-time }
        lastViewedAt: { type: string, format: date-time }
    ProgressMetric:
      type: object
      additionalProperties: false
      required: [numerator, denominator, percentage]
      properties:
        numerator: { type: integer, minimum: 0 }
        denominator: { type: integer, minimum: 0 }
        percentage: { type: number, minimum: 0, maximum: 100, multipleOf: 0.01, description: Zero when denominator is zero; zero does not imply completion. }
    ProgressTopic:
      type: object
      additionalProperties: false
      required: [id, title, slug, displayOrder, content, flashcards, quiz, test]
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        slug: { type: string }
        displayOrder: { type: integer }
        content: { $ref: '#/components/schemas/ProgressMetric' }
        flashcards: { $ref: '#/components/schemas/ProgressMetric' }
        quiz: { $ref: '#/components/schemas/ProgressMetric' }
        test: { $ref: '#/components/schemas/ProgressMetric' }
    ProgressSystem:
      type: object
      additionalProperties: false
      required: [id, name, slug, displayOrder, content, flashcards, quiz, test, topics]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        displayOrder: { type: integer }
        content: { $ref: '#/components/schemas/ProgressMetric' }
        flashcards: { $ref: '#/components/schemas/ProgressMetric' }
        quiz: { $ref: '#/components/schemas/ProgressMetric' }
        test: { $ref: '#/components/schemas/ProgressMetric' }
        topics:
          type: array
          items: { $ref: '#/components/schemas/ProgressTopic' }
    DashboardAttemptCounts:
      type: object
      additionalProperties: false
      required: [total, quiz, test, autoSubmitted]
      properties:
        total: { type: integer, minimum: 0 }
        quiz: { type: integer, minimum: 0 }
        test: { type: integer, minimum: 0 }
        autoSubmitted: { type: integer, minimum: 0 }
    RecentAttempt:
      type: object
      additionalProperties: false
      required: [id, assessmentType, status, startedAt, completedAt, durationSeconds, correctCount, incorrectCount, unansweredCount, totalQuestionCount, scorePercentage, organSystemId, organSystemName]
      properties:
        id: { type: string, format: uuid }
        assessmentType: { $ref: '#/components/schemas/AssessmentType' }
        status: { type: string, enum: [COMPLETED, AUTO_SUBMITTED] }
        startedAt: { type: string, format: date-time }
        completedAt: { type: [string, 'null'], format: date-time }
        durationSeconds: { type: [integer, 'null'], minimum: 0 }
        correctCount: { type: integer, minimum: 0 }
        incorrectCount: { type: integer, minimum: 0 }
        unansweredCount: { type: integer, minimum: 0 }
