openapi: 3.1.0
info:
  title: AnatoLearn API
  version: 0.7.0
  description: Implemented API surface through the Phase 7 contract-hardening pass. Future routes are omitted; there is no public question-bank route. Notification sending is supported, but provider readiness is deployment-specific.
servers:
  - url: /api/v1
    description: Versioned API base
tags:
  - name: Platform
  - name: Auth
  - name: Profile
  - name: Published content
  - name: Admin content
  - name: Admin media
  - name: Admin audit
  - name: Flashcards
  - name: Admin flashcards
  - name: Admin questions
  - name: Assessments
  - name: Progress
  - name: Admin progress
  - name: Admin dashboard
  - name: Admin users
  - name: Feedback
  - name: Admin feedback
  - name: Notifications
  - name: Admin notifications
  - name: Internal jobs
security:
  - bearerAuth: []
  - cookieAuth: []
paths:
  /health:
    servers: [{ url: /api }]
    get:
      tags: [Platform]
      operationId: getHealth
      security: []
      responses:
        '200': { $ref: '#/components/responses/HealthSuccess' }
  /meta:
    get:
      tags: [Platform]
      operationId: getMeta
      security: []
      responses:
        '200': { $ref: '#/components/responses/MetaSuccess' }
  /auth/register:
    post:
      tags: [Auth]
      operationId: register
      security: []
      requestBody: { $ref: '#/components/requestBodies/RegisterBody' }
      responses:
        '201': { $ref: '#/components/responses/RegisterSuccess' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '409': { $ref: '#/components/responses/Conflict' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '503': { $ref: '#/components/responses/InternalError' }
  /auth/login:
    post:
      tags: [Auth]
      operationId: login
      security: []
      requestBody: { $ref: '#/components/requestBodies/LoginBody' }
      responses:
        '200': { $ref: '#/components/responses/LoginSuccess' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/RateLimited' }
  /auth/forgot-password:
    post:
      tags: [Auth]
      operationId: forgotPassword
      security: []
      requestBody: { $ref: '#/components/requestBodies/EmailBody' }
      responses:
        '200': { $ref: '#/components/responses/MessageSuccess' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '429': { $ref: '#/components/responses/RateLimited' }
  /auth/reset-password:
    post:
      tags: [Auth]
      operationId: resetPassword
      security: []
      requestBody: { $ref: '#/components/requestBodies/ResetPasswordBody' }
      responses:
        '200': { $ref: '#/components/responses/PasswordUpdatedSuccess' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/Unprocessable' }
        '429': { $ref: '#/components/responses/RateLimited' }
  /auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      security: []
      responses:
        '200': { $ref: '#/components/responses/LogoutSuccess' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /auth/session:
    get:
      tags: [Auth]
      operationId: getSession
      responses:
        '200': { $ref: '#/components/responses/SessionSuccess' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /me:
    get:
      tags: [Profile]
      operationId: getMe
      responses:
        '200': { $ref: '#/components/responses/ProfileSuccess' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    patch:
      tags: [Profile]
      operationId: updateMe
      requestBody: { $ref: '#/components/requestBodies/ProfileUpdateBody' }
      responses:
        '200': { $ref: '#/components/responses/ProfileSuccess' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /me/change-password:
    post:
      tags: [Profile]
      operationId: changePassword
      requestBody: { $ref: '#/components/requestBodies/ChangePasswordBody' }
      responses:
        '200': { $ref: '#/components/responses/PasswordUpdatedSuccess' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/Unprocessable' }
        '429': { $ref: '#/components/responses/RateLimited' }
  /me/device-tokens:
    post:
      tags: [Profile]
      operationId: upsertDeviceToken
      description: Registers or reassigns an Expo token to the authenticated active profile. Reassignment cancels the previous owner's pending deliveries. Token text is never returned. Cookie requests require a safe same-origin Origin/Host.
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/DeviceTokenInput' } } }
      responses:
        '201': { $ref: '#/components/responses/DeviceTokenSuccess' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/InternalError' }
  /me/device-tokens/{id}:
    parameters: [{ $ref: '#/components/parameters/Id' }]
    delete:
      tags: [Profile]
      operationId: deactivateDeviceToken
      description: Owner-scoped, idempotently deactivates the token and cancels its pending deliveries. Token and historical delivery rows are retained. Cookie requests require a safe same-origin Origin/Host.
      responses:
        '200': { $ref: '#/components/responses/DeviceTokenDeactivationSuccess' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/InternalError' }
  /organ-systems:
    get:
      tags: [Published content]
      operationId: listPublishedOrganSystems
      description: Returns published, active organ systems for an active profile.
      parameters:
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/PageSize' }
        - { $ref: '#/components/parameters/Q' }
        - $ref: '#/components/parameters/ContentSortBy'
        - { $ref: '#/components/parameters/SortOrder' }
      responses:
        '200': { $ref: '#/components/responses/PublishedOrganSystemListSuccess' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /organ-systems/{slug}:
    parameters: [{ $ref: '#/components/parameters/Slug' }]
    get:
      tags: [Published content]
      operationId: getPublishedOrganSystem
      responses:
        '200': { $ref: '#/components/responses/PublishedOrganSystemSuccess' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
  /organ-systems/{slug}/topics:
    parameters: [{ $ref: '#/components/parameters/Slug' }]
    get:
      tags: [Published content]
      operationId: listPublishedTopics
      parameters:
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/PageSize' }
        - { $ref: '#/components/parameters/Q' }
        - { $ref: '#/components/parameters/SortOrder' }
      responses:
        '200': { $ref: '#/components/responses/PublishedTopicListSuccess' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
  /topics/{id}:
    parameters: [{ $ref: '#/components/parameters/Id' }]
    get:
      tags: [Published content]
      operationId: getPublishedTopic
      responses:
        '200': { $ref: '#/components/responses/PublishedTopicSuccess' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
  /topics/{id}/content:
    parameters: [{ $ref: '#/components/parameters/Id' }]
    get:
      tags: [Published content]
      operationId: listPublishedLessons
      description: Returns all published lessons ordered by displayOrder then id; not paginated.
      responses:
        '200': { $ref: '#/components/responses/PublishedLessonListSuccess' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }
  /topics/{id}/flashcards:
    parameters: [{ $ref: '#/components/parameters/Id' }]
    get:
      tags: [Flashcards]
      operationId: listPublishedFlashcards
      description: Authenticated, non-paginated eligible cards ordered by displayOrder then id, with the requesting user's progress.
      responses:
        '200': { $ref: '#/components/responses/FlashcardListSuccess' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
  /flashcards/{id}/progress:
    parameters: [{ $ref: '#/components/parameters/Id' }]
    put:
      tags: [Flashcards]
      operationId: updateFlashcardProgress
      description: Idempotently records one view event for the authenticated user and optionally updates difficult/mastered flags. Cookie mode requires safe Origin.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FlashcardProgressInput' }
      responses:
        '200': { $ref: '#/components/responses/FlashcardProgressSuccess' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }
  /media/{id}:
    parameters: [{ $ref: '#/components/parameters/Id' }]
    get:
      tags: [Published content]
      operationId: getPublishedMedia
      x-error-codes: [VALIDATION_ERROR, UNAUTHORIZED, NOT_FOUND, STORAGE_ERROR, INTERNAL_ERROR]
      description: Returns a 300-second signed URL for eligible published media or media preserved in an attempt snapshot owned by the requester. Historical media may be archived; absent and unauthorized assets return 404.
      responses:
        '200': { $ref: '#/components/responses/PublishedMediaSuccess' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }
        '502': { $ref: '#/components/responses/StorageError' }
  /assessments/start:
    post:
      tags: [Assessments]
      operationId: startAssessment
      x-error-codes: [VALIDATION_ERROR, UNAUTHORIZED, INVALID_ORIGIN, SYSTEM_NOT_FOUND, INVALID_TOPIC_SCOPE, NO_TOPICS, INSUFFICIENT_QUESTIONS, QUESTION_UNAVAILABLE, TRANSACTION_FAILED, INVALID_QUESTION, INVALID_SNAPSHOT, INTERNAL_ERROR]
      description: Starts an owned randomized immutable snapshot attempt. Cookie mode requires safe Origin. Omitted topicIds selects across all published topics in the system.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/StartAssessmentInput' }
      responses:
        '201': { $ref: '#/components/responses/AttemptDetailSuccess' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/Unprocessable' }
        '500': { $ref: '#/components/responses/InternalError' }
  /attempts:
    get:
      tags: [Assessments]
      operationId: listOwnedAttempts
      x-error-codes: [VALIDATION_ERROR, UNAUTHORIZED, TRANSACTION_FAILED, INTERNAL_ERROR]
      description: Lists only the authenticated user's attempts, newest createdAt then id. Lazily finalizes at most 50 due tests for that user.
      parameters:
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/PageSize' }
        - { $ref: '#/components/parameters/AssessmentTypeQuery' }
        - { $ref: '#/components/parameters/AttemptStatusQuery' }
        - { $ref: '#/components/parameters/OrganSystemIdQuery' }
      responses:
        '200': { $ref: '#/components/responses/AttemptListSuccess' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }
  /attempts/{attemptId}:
    parameters: [{ $ref: '#/components/parameters/AttemptId' }]
    get:
      tags: [Assessments]
      operationId: getOwnedAttempt
      x-error-codes: [VALIDATION_ERROR, UNAUTHORIZED, NOT_FOUND, TRANSACTION_FAILED, INVALID_SNAPSHOT, INTERNAL_ERROR]
      description: Returns a secret-safe snapshot detail for every status and lazily auto-submits a due test. Score, correct keys, correctness, and explanations are always omitted here.
      responses:
        '200': { $ref: '#/components/responses/AttemptDetailSuccess' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }
  /attempts/{attemptId}/answers/{attemptQuestionId}:
    parameters:
      - { $ref: '#/components/parameters/AttemptId' }
      - { $ref: '#/components/parameters/AttemptQuestionId' }
    put:
      tags: [Assessments]
      operationId: updateOwnedAttemptAnswer
      x-error-codes: [VALIDATION_ERROR, UNAUTHORIZED, INVALID_ORIGIN, NOT_FOUND, ATTEMPT_TERMINAL, ATTEMPT_EXPIRED, INVALID_OPTION, TRANSACTION_FAILED, INTERNAL_ERROR]
      description: Sets or clears one answer while in progress. timeSpentSeconds is monotonic. A due test is committed as auto-submitted before ATTEMPT_EXPIRED is returned. Cookie mode requires safe Origin.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AttemptAnswerInput' }
      responses:
        '200': { $ref: '#/components/responses/AttemptAnswerSuccess' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/Unprocessable' }
        '500': { $ref: '#/components/responses/InternalError' }
  /attempts/{attemptId}/submit:
    parameters: [{ $ref: '#/components/parameters/AttemptId' }]
    post:
      tags: [Assessments]
      operationId: submitOwnedAttempt
      x-error-codes: [VALIDATION_ERROR, UNAUTHORIZED, INVALID_ORIGIN, NOT_FOUND, ATTEMPT_NOT_SUBMITTED, TRANSACTION_FAILED, INVALID_SNAPSHOT, INTERNAL_ERROR]
      description: Scores an in-progress attempt using database time. Replays of completed/auto-submitted attempts return the immutable existing result. Cookie mode requires safe Origin.
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EmptyMutation' }
      responses:
        '200': { $ref: '#/components/responses/AttemptResultSuccess' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }
  /attempts/{attemptId}/result:
    parameters: [{ $ref: '#/components/parameters/AttemptId' }]
    get:
      tags: [Assessments]
      operationId: getOwnedAttemptResult
      x-error-codes: [VALIDATION_ERROR, UNAUTHORIZED, NOT_FOUND, RESULT_NOT_READY, TRANSACTION_FAILED, INVALID_SNAPSHOT, INTERNAL_ERROR]
      description: Returns score, correct keys, correctness, and snapshot explanations only for COMPLETED or AUTO_SUBMITTED attempts. Lazily auto-submits a due test.
      responses:
        '200': { $ref: '#/components/responses/AttemptResultSuccess' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }
  /attempts/{attemptId}/retake:
    parameters: [{ $ref: '#/components/parameters/AttemptId' }]
    post:
      tags: [Assessments]
      operationId: retakeOwnedAttempt
      x-error-codes: [VALIDATION_ERROR, UNAUTHORIZED, INVALID_ORIGIN, NOT_FOUND, SOURCE_NOT_SUBMITTED, SYSTEM_NOT_FOUND, INVALID_TOPIC_SCOPE, NO_TOPICS, INSUFFICIENT_QUESTIONS, QUESTION_UNAVAILABLE, TRANSACTION_FAILED, INVALID_SNAPSHOT, INTERNAL_ERROR]
      description: Creates a fresh random attempt from the submitted source type/system/topic scope/requested count. It does not copy the old questions. Cookie mode requires safe Origin.
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EmptyMutation' }
      responses:
        '201': { $ref: '#/components/responses/AttemptDetailSuccess' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/Unprocessable' }
        '500': { $ref: '#/components/responses/InternalError' }
  /content-lessons/{id}/progress:
    parameters: [{ $ref: '#/components/parameters/Id' }]
    put:
      tags: [Progress]
      operationId: updateOwnedLessonProgress
      x-error-codes: [VALIDATION_ERROR, UNAUTHORIZED, INVALID_ORIGIN, NOT_FOUND, TRANSACTION_FAILED, INTERNAL_ERROR]
      description: Sets the authenticated user's absolute completion state for an accessible published lesson. Repeated completion preserves the first completedAt. Cookie mode requires safe Origin.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LessonProgressInput' }
      responses:
        '200': { $ref: '#/components/responses/LessonProgressSuccess' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }
  /progress:
    get:
      tags: [Progress]
      operationId: getOwnedProgress
      x-error-codes: [UNAUTHORIZED, TRANSACTION_FAILED, INTERNAL_ERROR]
      description: Recomputes authoritative progress for current published systems/topics. Zero denominators return 0/0 and 0%, not completion.
      responses:
        '200': { $ref: '#/components/responses/ProgressListSuccess' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }
  /progress/{organSystemId}:
    parameters: [{ $ref: '#/components/parameters/OrganSystemIdPath' }]
    get:
      tags: [Progress]
      operationId: getOwnedOrganSystemProgress
      x-error-codes: [VALIDATION_ERROR, UNAUTHORIZED, NOT_FOUND, TRANSACTION_FAILED, INTERNAL_ERROR]
      responses:
        '200': { $ref: '#/components/responses/ProgressSystemSuccess' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }
  /dashboard/me:
    get:
      tags: [Progress]
      operationId: getOwnedDashboard
      x-error-codes: [UNAUTHORIZED, TRANSACTION_FAILED, INTERNAL_ERROR]
      description: Submitted attempt totals, weighted all-question accuracy, latest 10 submitted attempts, current progress, and up to five strength/weakness topics requiring at least five answers.
      responses:
        '200': { $ref: '#/components/responses/UserDashboardSuccess' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }
  /feedback:
    post:
      tags: [Feedback]
      operationId: submitFeedback
      description: Creates feedback owned by the authenticated active profile. Limited process-locally to five attempts per profile per 60 seconds. No admin audit row is written.
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/FeedbackCreateInput' } } }
      responses:
        '201': { $ref: '#/components/responses/LearnerFeedbackSuccess' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/InternalError' }
  /feedback/mine:
    get:
      tags: [Feedback]
      operationId: listOwnedFeedback
      description: Owner-scoped feedback history. Admin notes and review/resolution attribution are omitted.
      parameters:
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/PageSize' }
        - { name: type, in: query, schema: { $ref: '#/components/schemas/FeedbackType' } }
        - { name: status, in: query, schema: { $ref: '#/components/schemas/FeedbackStatus' } }
      responses:
        '200': { $ref: '#/components/responses/LearnerFeedbackListSuccess' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalError' }
  /notifications:
    get:
      tags: [Notifications]
      operationId: listOwnedNotifications
      description: Lists only the authenticated profile's recipients from SENT or PARTIAL campaigns. The optional status query is accepted by the shared parser but has no effect on this owner-scoped result.
      parameters:
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/PageSize' }
        - { name: status, in: query, description: Accepted for shared-parser compatibility but ignored., schema: { $ref: '#/components/schemas/NotificationStatus' } }
      responses:
        '200': { $ref: '#/components/responses/LearnerNotificationListSuccess' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalError' }
  /notifications/{recipientId}/read:
    parameters: [{ $ref: '#/components/parameters/RecipientId' }]
    post:
      tags: [Notifications]
      operationId: markOwnedNotificationRead
      description: Idempotently sets readAt for an owned recipient of a SENT or PARTIAL campaign. The body must be absent or an empty JSON object. Cookie requests require a safe same-origin Origin/Host. Read state is operational history, not an admin audit event.
      requestBody:
        required: false
        content: { application/json: { schema: { $ref: '#/components/schemas/EmptyMutation' } } }
      responses:
        '200': { $ref: '#/components/responses/LearnerNotificationSuccess' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }
  /admin/dashboard:
    get:
      tags: [Admin dashboard]
      operationId: getAdminDashboard
      x-required-role: ADMIN
