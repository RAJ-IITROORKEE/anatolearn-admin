    get:
      tags: [Internal jobs]
      operationId: processNotificationsCron
      security: [{ cronBearer: [] }]
      description: Vercel Cron entrypoint. A disabled/incomplete provider returns zero counts without mutation. Otherwise claims with SKIP LOCKED and leases, materializes audiences once, processes at most five campaigns/500 delivery operations/eight seconds, and writes no admin audits.
