      description: Narrow profile plus authoritative user dashboard/progress
      headers: *privateResponseHeaders
      content:
        application/json:
          schema: { $ref: '#/components/schemas/AdminUserProgressEnvelope' }
    CronSuccess:
      description: Bounded due-attempt batch result
      headers: *privateResponseHeaders
      content:
        application/json:
          schema: { $ref: '#/components/schemas/CronEnvelope' }
    BadRequest:
      description: Request validation failed or a required reorder parent is missing
      headers: *privateResponseHeaders
      content: &errorContent
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }
    Unauthorized:
      description: Missing, invalid, or inactive identity
      headers: *privateResponseHeaders
      content: *errorContent
    Forbidden:
      description: Active identity lacks ADMIN role or cookie mutation origin is unsafe
      headers: *privateResponseHeaders
      content: *errorContent
    NotFound:
      description: Resource is absent or inaccessible
      headers: *privateResponseHeaders
      content: *errorContent
    Conflict:
      description: Unique, lifecycle, publication, or reference conflict
      headers: *privateResponseHeaders
      content: *errorContent
    Unprocessable:
      description: Parent, media, or reorder reference cannot be processed
      headers: *privateResponseHeaders
      content: *errorContent
    RateLimited:
      description: Too many requests
      headers:
        X-Request-ID: { $ref: '#/components/headers/XRequestId' }
        Cache-Control: { $ref: '#/components/headers/PrivateCacheControl' }
        Vary: { $ref: '#/components/headers/PrivateVary' }
        Retry-After: { $ref: '#/components/headers/RetryAfter' }
      content: *errorContent
    InternalError:
      description: Unexpected failure or invalid stored lesson content
      headers: *privateResponseHeaders
      content: *errorContent
    StorageError:
      description: Supabase Storage upload or signed-read failure
      headers: *privateResponseHeaders
      content: *errorContent
    CronUnavailable:
      description: Scheduled processing is disabled because CRON_SECRET is not configured
      headers: *privateResponseHeaders
      content: *errorContent
    ProviderUnavailable:
      description: Expo sending is disabled or incompletely configured; send-now performs no campaign mutation
      headers: *privateResponseHeaders
      content: *errorContent
    CronUnauthorized:
      description: Missing or invalid CRON_SECRET bearer credential
      headers: *privateResponseHeaders
      content: *errorContent
