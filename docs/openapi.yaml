components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Supabase access token
    cookieAuth:
      type: apiKey
      in: cookie
      name: sb-session
      description: Logical Supabase SSR session; concrete cookie names are SDK-managed.
    cronBearer:
      type: http
      scheme: bearer
      bearerFormat: CRON_SECRET
      description: Server-only random secret of at least 32 characters; not a Supabase user token.
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    AttemptId:
      name: attemptId
      in: path
      required: true
      schema: { type: string, format: uuid }
    AttemptQuestionId:
      name: attemptQuestionId
      in: path
      required: true
      schema: { type: string, format: uuid }
    OrganSystemIdPath:
      name: organSystemId
      in: path
      required: true
      schema: { type: string, format: uuid }
    Slug:
      name: slug
      in: path
      required: true
      schema: { type: string }
    Page:
      name: page
      in: query
      schema: { type: integer, minimum: 1, default: 1 }
    PageSize:
      name: pageSize
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    Q:
      name: q
      in: query
      schema: { type: string, maxLength: 200 }
    PublishStatus:
      name: status
      in: query
      schema: { $ref: '#/components/schemas/PublishStatus' }
    ContentSortBy:
      name: sortBy
      in: query
      schema: { type: string, enum: [displayOrder, name, title, createdAt, updatedAt], default: displayOrder }
    SortOrder:
      name: sortOrder
      in: query
      schema: { type: string, enum: [asc, desc], default: asc }
    OrganSystemIdQuery:
      name: organSystemId
      in: query
      schema: { type: string, format: uuid }
    TopicIdQuery:
      name: topicId
      in: query
      schema: { type: string, format: uuid }
    DifficultyQuery:
      name: difficulty
      in: query
      schema: { $ref: '#/components/schemas/Difficulty' }
    AssessmentTypeQuery:
      name: assessmentType
      in: query
      schema: { $ref: '#/components/schemas/AssessmentType' }
    AttemptStatusQuery:
      name: status
      in: query
      schema: { $ref: '#/components/schemas/AttemptStatus' }
  requestBodies:
    JsonObject:
      required: true
      content:
        application/json:
          schema: { type: object }
    ContentMutation:
      required: true
      content:
        application/json:
          schema:
            oneOf:
              - { $ref: '#/components/schemas/StatusInput' }
              - type: object
                minProperties: 1
                description: A strict non-empty partial of the resource's create schema.
  schemas:
    PublishStatus: { type: string, enum: [DRAFT, PUBLISHED, ARCHIVED] }
    EditableStatus: { type: string, enum: [DRAFT, PUBLISHED] }
    Difficulty: { type: string, enum: [EASY, MEDIUM, HARD] }
    AssessmentType: { type: string, enum: [QUIZ, TEST] }
    AttemptStatus: { type: string, enum: [IN_PROGRESS, COMPLETED, AUTO_SUBMITTED, ABANDONED] }
    StartAssessmentInput:
      type: object
      additionalProperties: false
      required: [assessmentType, organSystemId, questionCount]
      properties:
        assessmentType: { $ref: '#/components/schemas/AssessmentType' }
        organSystemId: { type: string, format: uuid }
        topicIds:
          type: array
          minItems: 1
          maxItems: 100
          uniqueItems: true
          items: { type: string, format: uuid }
        questionCount: { type: integer, minimum: 5, maximum: 50 }
    EmptyMutation:
      type: object
      additionalProperties: false
      maxProperties: 0
    AttemptAnswerInput:
      type: object
      additionalProperties: false
      required: [answeredOptionKey]
      properties:
        answeredOptionKey: { type: [string, 'null'], format: uuid, description: A key from this attempt question's shuffled snapshot options, or null to clear. }
        timeSpentSeconds: { type: integer, minimum: 0, maximum: 86400, description: Monotonic telemetry; values below the stored value do not decrease it. }
    AttemptAnswerReceipt:
      type: object
      additionalProperties: false
      required: [id, answeredOptionKey, answeredAt, timeSpentSeconds]
      properties:
        id: { type: string, format: uuid }
        answeredOptionKey: { type: [string, 'null'], format: uuid }
        answeredAt: { type: [string, 'null'], format: date-time }
        timeSpentSeconds: { type: [integer, 'null'], minimum: 0, maximum: 86400 }
    AttemptSnapshotOption:
      type: object
      additionalProperties: false
      required: [key, label, displayOrder, optionText, imageUrl, mediaId]
      properties:
        key: { type: string, format: uuid }
        label: { type: string, pattern: '^[A-F]$' }
        displayOrder: { type: integer, minimum: 1, maximum: 6 }
        optionText: { type: string }
        imageUrl: { type: [string, 'null'] }
        mediaId: { type: [string, 'null'], format: uuid }
    AttemptQuestionSafe:
      type: object
      description: Secret-safe for every status; correctOptionKey, isCorrect, and explanation are absent.
      required: [id, displayOrder, questionText, imageUrl, mediaId, options, answeredOptionKey, answeredAt, timeSpentSeconds, topicId, topicTitle, difficulty, conceptTag, organSystemId, organSystemName]
      properties:
        id: { type: string, format: uuid }
        displayOrder: { type: integer, minimum: 1 }
        questionText: { type: string }
        imageUrl: { type: [string, 'null'] }
        mediaId: { type: [string, 'null'], format: uuid }
        options:
          type: array
          minItems: 2
          maxItems: 6
          items: { $ref: '#/components/schemas/AttemptSnapshotOption' }
        answeredOptionKey: { type: [string, 'null'], format: uuid }
        answeredAt: { type: [string, 'null'], format: date-time }
        timeSpentSeconds: { type: [integer, 'null'], minimum: 0 }
        topicId: { type: string, format: uuid }
        topicTitle: { type: string }
        difficulty: { $ref: '#/components/schemas/Difficulty' }
        conceptTag: { type: [string, 'null'] }
        organSystemId: { type: string, format: uuid }
        organSystemName: { type: string }
    AttemptQuestionResult:
      allOf:
        - { $ref: '#/components/schemas/AttemptQuestionSafe' }
        - type: object
          required: [correctOptionKey, isCorrect, explanation]
          properties:
            correctOptionKey: { type: string, format: uuid }
            isCorrect: { type: [boolean, 'null'] }
            explanation: { type: string }
    AttemptBase:
      type: object
      required: [id, assessmentType, organSystemId, topicIds, requestedQuestionCount, totalQuestionCount, timeLimitSeconds, startedAt, expiresAt, completedAt, status, retakeSourceId]
      properties:
        id: { type: string, format: uuid }
        assessmentType: { $ref: '#/components/schemas/AssessmentType' }
        organSystemId: { type: string, format: uuid }
        topicIds:
          type: array
          items: { type: string, format: uuid }
        requestedQuestionCount: { type: integer, minimum: 5, maximum: 50 }
        totalQuestionCount: { type: integer, minimum: 0, maximum: 50 }
        timeLimitSeconds: { type: [integer, 'null'], minimum: 0, description: Null for quizzes; questionCount times 60 for tests. }
        startedAt: { type: string, format: date-time }
        expiresAt: { type: [string, 'null'], format: date-time }
        completedAt: { type: [string, 'null'], format: date-time }
        status: { $ref: '#/components/schemas/AttemptStatus' }
        retakeSourceId: { type: [string, 'null'], format: uuid }
    AttemptDetail:
      allOf:
        - { $ref: '#/components/schemas/AttemptBase' }
        - type: object
          required: [questions]
          properties:
            questions:
              type: array
              items: { $ref: '#/components/schemas/AttemptQuestionSafe' }
    AttemptResult:
      allOf:
        - { $ref: '#/components/schemas/AttemptBase' }
        - type: object
          required: [correctCount, incorrectCount, unansweredCount, scorePercentage, durationSeconds, questions]
          properties:
            correctCount: { type: integer, minimum: 0 }
            incorrectCount: { type: integer, minimum: 0 }
            unansweredCount: { type: integer, minimum: 0 }
            scorePercentage: { type: number, minimum: 0, maximum: 100, multipleOf: 0.01 }
            durationSeconds: { type: integer, minimum: 0 }
            questions:
              type: array
              items: { $ref: '#/components/schemas/AttemptQuestionResult' }
    AttemptListItem:
      allOf:
        - { $ref: '#/components/schemas/AttemptBase' }
        - type: object
          description: Result fields are present only for COMPLETED and AUTO_SUBMITTED; they are absent for IN_PROGRESS and ABANDONED.
          properties:
            correctCount: { type: integer, minimum: 0 }
            incorrectCount: { type: integer, minimum: 0 }
            unansweredCount: { type: integer, minimum: 0 }
            scorePercentage: { type: number, minimum: 0, maximum: 100, multipleOf: 0.01 }
            durationSeconds: { type: [integer, 'null'], minimum: 0 }
    AdminAttemptUser:
      type: object
      additionalProperties: false
      required: [id, fullName, email, isActive]
      properties:
        id: { type: string, format: uuid }
        fullName: { type: string }
        email: { type: string, format: email }
        isActive: { type: boolean }
    AdminAttemptListItem:
      allOf:
        - { $ref: '#/components/schemas/AttemptListItem' }
        - type: object
          required: [user]
          properties: { user: { $ref: '#/components/schemas/AdminAttemptUser' } }
    AdminAttemptDetail:
      anyOf:
        - allOf:
            - { $ref: '#/components/schemas/AttemptDetail' }
