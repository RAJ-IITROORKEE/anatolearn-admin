  responses:
    HealthSuccess:
      description: Liveness response; Cache-Control is public, max-age=30 and Vary is omitted
      headers: &publicResponseHeaders
        X-Request-ID: { $ref: '#/components/headers/XRequestId' }
        Cache-Control: { $ref: '#/components/headers/HealthCacheControl' }
      content: { application/json: { schema: { $ref: '#/components/schemas/HealthEnvelope' } } }
    RegisterSuccess:
      description: Non-enumerating registration result; a new identity and USER profile may have been created
      headers: &privateResponseHeaders
