  responses:
    Success:
      description: Successful operation
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiSuccess' }
    ListSuccess:
      description: Successful paginated list; pagination is nested under meta.pagination.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiSuccess' }
    AdminMediaSuccess:
      description: Admin media metadata with a 900-second signed URL
      content:
        application/json:
          schema: { $ref: '#/components/schemas/AdminMediaEnvelope' }
    AdminMediaListSuccess:
      description: Paginated admin media DTOs with decimal-string byte sizes and 900-second signed URLs
      content:
        application/json:
          schema: { $ref: '#/components/schemas/AdminMediaListEnvelope' }
    PublishedMediaSuccess:
      description: Eligible published-media metadata with a 300-second signed URL
      content:
        application/json:
          schema: { $ref: '#/components/schemas/PublishedMediaEnvelope' }
    FlashcardAdminSuccess:
      description: Admin flashcard DTO
      content:
        application/json:
          schema: { $ref: '#/components/schemas/FlashcardEnvelope' }
    FlashcardListSuccess:
      description: Published flashcards with per-user progress; admin list operations additionally include pagination metadata.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/FlashcardListEnvelope' }
    FlashcardProgressSuccess:
      description: Current authenticated-user progress for the flashcard
      content:
        application/json:
          schema: { $ref: '#/components/schemas/FlashcardProgressEnvelope' }
    QuestionSuccess:
      description: Admin-only full question aggregate including options, correct answer, and explanation
      content:
        application/json:
          schema: { $ref: '#/components/schemas/QuestionEnvelope' }
    QuestionListSuccess:
      description: Paginated admin-only full question aggregates
      content:
        application/json:
          schema: { $ref: '#/components/schemas/QuestionListEnvelope' }
    AttemptDetailSuccess:
      description: Secret-safe owned attempt snapshot detail; result secrets are omitted for every status
      content:
        application/json:
          schema: { $ref: '#/components/schemas/AttemptDetailEnvelope' }
    AttemptResultSuccess:
      description: Immutable submitted result with correct option keys, correctness, and explanations
      content:
        application/json:
          schema: { $ref: '#/components/schemas/AttemptResultEnvelope' }
    AttemptAnswerSuccess:
      description: Stored answer receipt without correctness disclosure
      content:
        application/json:
          schema: { $ref: '#/components/schemas/AttemptAnswerEnvelope' }
    AttemptListSuccess:
      description: Paginated owned attempts; result fields appear only for completed or auto-submitted items
      content:
        application/json:
          schema: { $ref: '#/components/schemas/AttemptListEnvelope' }
    LessonProgressSuccess:
      description: Authenticated user's absolute lesson completion state
      content:
        application/json:
          schema: { $ref: '#/components/schemas/LessonProgressEnvelope' }
    ProgressListSuccess:
      description: Authoritative progress across current published active systems
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ProgressListEnvelope' }
    ProgressSystemSuccess:
      description: Authoritative progress for one current published active system
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ProgressSystemEnvelope' }
    UserDashboardSuccess:
      description: Owned submitted-attempt and progress dashboard
      content:
        application/json:
          schema: { $ref: '#/components/schemas/UserDashboardEnvelope' }
    AdminAttemptListSuccess:
      description: Paginated read-only admin attempt history
      content:
        application/json:
          schema: { $ref: '#/components/schemas/AdminAttemptListEnvelope' }
    AdminAttemptDetailSuccess:
      description: Read-only admin attempt snapshot; result secrets appear only after submission
      content:
        application/json:
          schema: { $ref: '#/components/schemas/AdminAttemptDetailEnvelope' }
    AdminUserProgressSuccess:
      description: Narrow profile plus authoritative user dashboard/progress
      content:
        application/json:
          schema: { $ref: '#/components/schemas/AdminUserProgressEnvelope' }
    CronSuccess:
      description: Bounded due-attempt batch result
      content:
        application/json:
          schema: { $ref: '#/components/schemas/CronEnvelope' }
    BadRequest:
      description: Request validation failed or a required reorder parent is missing
      content: &errorContent
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }
    Unauthorized:
      description: Missing, invalid, or inactive identity
      content: *errorContent
    Forbidden:
      description: Active identity lacks ADMIN role or cookie mutation origin is unsafe
      content: *errorContent
    NotFound:
      description: Resource is absent or inaccessible
      content: *errorContent
    Conflict:
      description: Unique, lifecycle, publication, or reference conflict
      content: *errorContent
    Unprocessable:
      description: Parent, media, or reorder reference cannot be processed
      content: *errorContent
    RateLimited:
      description: Too many requests
      content: *errorContent
    InternalError:
      description: Unexpected failure or invalid stored lesson content
      content: *errorContent
    StorageError:
      description: Supabase Storage upload or signed-read failure
      content: *errorContent
    CronUnavailable:
      description: Scheduled processing is disabled because CRON_SECRET is not configured
      content: *errorContent
    CronUnauthorized:
      description: Missing or invalid CRON_SECRET bearer credential
      content: *errorContent
